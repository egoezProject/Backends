<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Management System</title>
  <script type="module" crossorigin src="/assets/index-DnNU-u70.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-iUjY7PFa.css">
</head>
<body class="dark-theme">
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="screen active">
            <div class="glass-card login-card">
                <h2>Access Control</h2>
                <div class="input-group">
                    <input type="password" id="secret-key" placeholder="Enter Secret Key">
                </div>
                <button id="login-btn" class="glow-btn">Authenticate</button>
                <p id="login-error" class="error-text"></p>
            </div>
        </div>

        <!-- Dashboard Screen -->
        <div id="dashboard-screen" class="screen">
            <header>
                <h1>Device Dashboard</h1>
                <div class="user-info">
                    <span id="status-dot" class="dot"></span>
                    <span id="connection-status">Disconnected</span>
                    <button id="logout-btn" class="danger-btn" style="margin-left: 15px; padding: 6px 12px; font-size: 0.8rem; background: #ff3366;">Çıkış Yap</button>
                </div>
            </header>
            <main>
                <div class="device-list-container glass-card">
                    <div class="device-list-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 style="margin: 0;">Connected Devices</h3>
                        <button id="refresh-agents-btn" class="glow-btn" style="width: auto; padding: 8px 16px;">Refresh List</button>
                    </div>
                    <div id="device-list" class="device-list">
                        <!-- Devices will be injected here -->
                    </div>
                </div>
            </main>
        </div>

        <div id="management-screen" class="screen">
            <header class="mgmt-header">
                <button id="back-to-dash" class="text-btn">← Back</button>
                <div class="target-title">
                    Managing: <span id="current-device-name">Device Name</span>
                    <span id="device-uptime-badge" class="badge">Uptime: 0h</span>
                </div>
                <div id="hb-indicator" class="heartbeat-active">ONLINE</div>
            </header>
            <div class="split-container">
                <div class="split-left terminal-container">
                    <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 16px;">
                        <span>Pardus Terminal</span>
                        <div id="terminal-tabs" style="display: flex; gap: 5px;">
                            <button class="term-tab active-tab" data-target="term1" style="padding: 4px 10px; font-size: 0.8rem; background: var(--accent-color); color: black; border: none; border-radius: 4px; cursor: pointer;">Term 1</button>
                            <button class="term-tab" data-target="term2" style="padding: 4px 10px; font-size: 0.8rem; background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 4px; cursor: pointer;">Term 2</button>
                            <button class="term-tab" data-target="term3" style="padding: 4px 10px; font-size: 0.8rem; background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 4px; cursor: pointer;">Term 3</button>
                        </div>
                    </div>
                    <div class="terminal-view">
                        <div id="term1-view" style="width: 100%; height: 100%;"></div>
                        <div id="term2-view" style="width: 100%; height: 100%; display: none;"></div>
                        <div id="term3-view" style="width: 100%; height: 100%; display: none;"></div>
                    </div>
                </div>
                <div class="split-right network-container">
                    <div class="panel-header">Management Console</div>
                    <div class="control-panel">
                        <div class="control-section logs-section">
                            <h4>Connection Logs</h4>
                            <div id="log-screen" class="mini-logs">
                                <div class="log-entry">Waiting for connection...</div>
                            </div>
                        </div>
                        <div class="control-section logs-section">
                            <h4>Network Logs</h4>
                            <div id="traffic-monitor" class="traffic-monitor">
                                <!-- Traffic logs will be injected here -->
                            </div>
                        </div>
                        <div class="control-section">
                            <h4>Actions</h4>
                            <div class="btn-row">
                                <button id="shutdown-btn" class="danger-btn">Shutdown</button>
                                <button id="restart-btn" class="warning-btn">Restart</button>
                                <button id="send-manifest-btn" class="manifest-btn">Send Manifest</button>
                                <button id="send-autostartup-btn" class="autostartup-btn">Send AutoStartup</button>
                            </div>
                                
                        </div>
                        <div class="control-section">
                            <h4>Remote URL</h4>
                            <div class="input-row">
                                <input type="text" id="url-input" placeholder="Quick Link (https://...)">
                                <button id="send-url-btn">Launch</button>
                            </div>
                        </div>
                        <div class="control-section">
                            <h4>Popup</h4>
                            <div class="input-row">
                                <input type="text" id="popup-text" placeholder="Popup Text">
                                <button id="send-popup-btn">Send</button>
                            </div>
                        </div>
                        <div class="control-section">
                            <h4>Device Preferences</h4>
                            <button id="self-destruct-btn" class="critical-btn">Self Destruct</button>
                        </div>
                        <div class="control-section">
                            <h4>Pardus Özel Komutlar</h4>
                            <div class="btn-row">
                                <button id="fake-error-btn" class="danger-btn" style="flex: 1; padding: 12px; font-weight: bold; background: linear-gradient(135deg, #cc0000, #880000); box-shadow: 0 4px 15px rgba(204, 0, 0, 0.4);">💥 Fatal Error & Kapat</button>
                                <button id="lock-screen-btn" class="warning-btn" style="flex: 1; padding: 12px; font-weight: bold; background: linear-gradient(135deg, #f39c12, #d35400); color: white; box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4);">🔒 Ekranı Kilitle</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
